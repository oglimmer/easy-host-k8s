spring:
  application:
    name: easy-host
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/easyhost}
    username: ${SPRING_DATASOURCE_USERNAME:easyhost}
    password: ${SPRING_DATASOURCE_PASSWORD:easyhost}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  security:
    enabled: true

actuator:
  username: ${ACTUATOR_USERNAME:actuator}
  password: ${ACTUATOR_PASSWORD:changeme}

app:
  auth:
    mode: ${AUTH_MODE:password}
  user:
    username: ${APP_USER_USERNAME:admin}
    password: ${APP_USER_PASSWORD:changeme}
  oidc:
    issuer-url: ${OIDC_ISSUER_URL:}
    client-id: ${OIDC_CLIENT_ID:}
    client-secret: ${OIDC_CLIENT_SECRET:}
    allowed-users: ${OIDC_ALLOWED_USERS:}

info:
  app:
    name: @project.name@
    version: @project.version@
    build-time: @maven.build.timestamp@

server:
  port: 8080
  forward-headers-strategy: native
