<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — easy-host</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem('eh-theme')||'obsidian'</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-page">
        <div class="login-wrapper animate-in">
            <div class="login-brand">
                <h1 class="login-brand__title">easy-host</h1>
                <p class="login-brand__sub">Content Hosting</p>
                <div class="login-brand__line"></div>
            </div>

            <div th:if="${param.error}" class="flash flash--error">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="flash flash--success">
                You have been signed out.
            </div>

            <div th:if="${oidcEnabled}" class="animate-in animate-in--d1">
                <a th:href="@{/oauth2/authorization/keycloak}" class="btn btn--primary" style="width:100%;justify-content:center;text-decoration:none;display:flex">
                    Sign in with SSO
                </a>
                <div style="text-align:center;margin:1.5rem 0 1rem;opacity:0.5;font-size:0.85rem">or sign in as admin</div>
            </div>

            <form class="login-form" th:action="@{/login}" method="post">
                <div class="form-group animate-in animate-in--d1">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="Enter username" autocomplete="username" autofocus required>
                </div>
                <div class="form-group animate-in animate-in--d2">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <div class="animate-in animate-in--d3">
                    <button class="btn btn--primary" type="submit" style="width:100%;justify-content:center">
                        Sign in
                    </button>
                </div>
            </form>

            <div class="animate-in animate-in--d3" style="text-align:center;margin-top:1.5rem">
                <a th:href="@{/developers}" style="font-size:0.85rem;opacity:0.6">Developer Portal</a>
            </div>

            <div class="animate-in animate-in--d3 legal-footer" style="border-top:none;padding:1rem 0 0">
                <a th:href="@{/privacy}">Privacy</a>
                <a th:href="@{/terms}">Terms</a>
                <a th:href="@{/imprint}">Imprint</a>
            </div>
        </div>
    </div>
    <script th:src="@{/js/themes.js}"></script>
</body>
</html>
