<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Easy Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #08080d;
            --surface: #111119;
            --surface-raised: #181824;
            --border: #2a2a3a;
            --text: #e0ddd8;
            --text-muted: #7a7a8e;
            --accent: #b8ff57;
            --accent-dim: rgba(184, 255, 87, 0.15);
            --accent-glow: rgba(184, 255, 87, 0.3);
            --danger: #ff5757;
            --info: #57b8ff;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Gradient orb background */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .brand {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .brand span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 300;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-dim);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            background: var(--accent);
            color: var(--bg);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 1rem;
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-dim);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            border-left: 3px solid;
        }

        .alert-error {
            background: rgba(255, 87, 87, 0.08);
            color: var(--danger);
            border-color: var(--danger);
        }

        .alert-info {
            background: rgba(87, 184, 255, 0.08);
            color: var(--info);
            border-color: var(--info);
        }

        /* Decorative corner marks */
        .corner-mark {
            position: fixed;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.3;
            z-index: 1;
        }

        .corner-mark.tl { top: 1.5rem; left: 1.5rem; }
        .corner-mark.br { bottom: 1.5rem; right: 1.5rem; }
    </style>
</head>
<body>
    <span class="corner-mark tl">EASY_HOST//SYS</span>
    <span class="corner-mark br">v1.0</span>

    <div class="login-card">
        <div class="brand">easy<span>host</span></div>
        <p class="subtitle">Sign in to manage your content</p>

        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>
    </div>
</body>
</html>
