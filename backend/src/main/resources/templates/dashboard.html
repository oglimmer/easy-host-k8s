<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — easy-host</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem('eh-theme')||'obsidian'</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="topbar__brand" th:href="@{/dashboard}">
                easy-host <span>dashboard</span>
            </a>
            <nav class="topbar__nav">
                <a class="topbar__link topbar__link--active" th:href="@{/dashboard}">Content</a>
                <a class="topbar__link" th:href="@{/upload}">Upload</a>
                <a class="topbar__link" th:href="@{/developers}">Developers</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button class="topbar__link" type="submit"
                            style="background:none;border:none;cursor:pointer;font:inherit;padding:0">
                        Sign out
                    </button>
                </form>
            </nav>
        </header>

        <main class="main">
            <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>
            <div th:if="${error}" class="flash flash--error" th:text="${error}"></div>

            <div class="section-header animate-in">
                <div class="section-header__title">
                    <h1 class="display display--lg">Your content</h1>
                    <span class="section-header__count"
                          th:text="${#lists.size(contents)} + ' item' + (${#lists.size(contents)} != 1 ? 's' : '')"></span>
                </div>
                <a class="btn btn--primary" th:href="@{/upload}">New upload</a>
            </div>

            <div class="content-list animate-in animate-in--d1" th:if="${!#lists.isEmpty(contents)}">
                <div class="content-list__header label">
                    <span>Title</span>
                    <span>Updated</span>
                    <span></span>
                </div>
                <div class="content-list__row" th:each="item : ${contents}">
                    <div class="content-list__title">
                        <span th:text="${item.title}"></span>
                        <a th:if="${item.sourceUrl}" th:href="${item.sourceUrl}"
                           target="_blank" class="btn btn--ghost btn--sm" style="display:inline;padding:0.1rem 0.4rem;font-size:0.75rem">Source</a>
                    </div>
                    <div class="content-list__meta"
                         th:text="${#temporals.format(item.updatedAt, 'dd MMM yyyy')}"></div>
                    <div class="content-list__actions">
                        <a class="btn btn--ghost btn--sm" th:href="@{/edit/{slug}(slug=${item.slug})}">Edit</a>
                        <form th:action="@{/delete/{slug}(slug=${item.slug})}" method="post" class="delete-form"
                              onsubmit="return confirm('Delete this content permanently?')">
                            <button class="btn btn--danger btn--sm" type="submit">Delete</button>
                        </form>
                    </div>
                    <div class="content-list__slug">
                        <a th:href="@{/s/{slug}(slug=${item.slug})}"
                           th:text="${item.slug}" target="_blank"></a>
                    </div>
                </div>
            </div>

            <div class="content-list__empty animate-in animate-in--d1" th:if="${#lists.isEmpty(contents)}">
                <p>No content yet. Upload your first project to get started.</p>
                <a class="btn btn--primary" th:href="@{/upload}">Upload content</a>
            </div>
        </main>
    </div>
    <script th:src="@{/js/themes.js}"></script>
</body>
</html>
