<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Easy Host</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .navbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 1.2rem; }
        .navbar-actions { display: flex; gap: 0.75rem; align-items: center; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .alert { padding: 0.6rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .btn { padding: 0.45rem 0.9rem; border: none; border-radius: 4px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: transparent; border: 1px solid #d0d0d0; color: #333; }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-logout { background: transparent; border: 1px solid #d0d0d0; color: #333; padding: 0.35rem 0.7rem; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { background: #f5f5f5; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-size: 0.8rem; text-transform: uppercase; color: #666; font-weight: 600; }
        td { font-size: 0.9rem; }
        .actions { display: flex; gap: 0.4rem; align-items: center; }
        .empty { text-align: center; padding: 3rem; color: #999; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        a { color: #4a90d9; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>Easy Host</h1>
        <div class="navbar-actions">
            <a th:href="@{/upload}" class="btn btn-primary">Upload new</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div th:if="${#lists.isEmpty(contents)}" class="empty">
            <p>No content yet.</p>
            <p style="margin-top: 0.5rem"><a th:href="@{/upload}">Upload your first site</a></p>
        </div>

        <table th:unless="${#lists.isEmpty(contents)}">
            <thead>
                <tr>
                    <th>Slug</th>
                    <th>Files</th>
                    <th>Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${contents}">
                    <td>
                        <a th:href="@{'/s/' + ${c.slug}}" th:text="${c.slug}" target="_blank"></a>
                    </td>
                    <td th:text="${#lists.size(c.files)}"></td>
                    <td th:text="${#temporals.format(c.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <div class="actions">
                            <a th:href="@{'/edit/' + ${c.slug}}" class="btn btn-sm btn-outline">Edit</a>
                            <form th:action="@{'/delete/' + ${c.slug}}" method="post" style="display:inline"
                                  onsubmit="return confirm('Delete this content?')">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
