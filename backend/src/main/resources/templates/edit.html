<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Edit ' + ${content.slug} + ' — easy-host'">Edit — easy-host</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem('eh-theme')||'obsidian'</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="topbar__brand" th:href="@{/dashboard}">
                easy-host <span>edit</span>
            </a>
            <nav class="topbar__nav">
                <a class="topbar__link" th:href="@{/dashboard}">Content</a>
                <a class="topbar__link" th:href="@{/upload}">Upload</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button class="topbar__link" type="submit"
                            style="background:none;border:none;cursor:pointer;font:inherit;padding:0">
                        Sign out
                    </button>
                </form>
            </nav>
        </header>

        <main class="main">
            <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>
            <div th:if="${error}" class="flash flash--error" th:text="${error}"></div>

            <div class="section-header animate-in">
                <div class="section-header__title">
                    <h1 class="display display--lg">
                        Edit <em class="display" th:text="${content.slug}"
                                 style="font-style:italic;color:var(--accent)"></em>
                    </h1>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center">
                    <a class="btn btn--ghost btn--sm"
                       th:href="@{/s/{slug}(slug=${content.slug})}" target="_blank">View live</a>
                    <a class="btn btn--ghost" th:href="@{/dashboard}">Back</a>
                </div>
            </div>

            <div class="card animate-in animate-in--d1" style="margin-bottom:2rem"
                 th:if="${content.files != null and !content.files.isEmpty()}">
                <p class="label" style="margin-bottom:1rem">
                    Current files
                    <span th:text="'(' + ${#lists.size(content.files)} + ')'"></span>
                </p>
                <ul class="file-list">
                    <li class="file-list__item" th:each="f : ${content.files}">
                        <span class="file-list__icon">&#9671;</span>
                        <span class="file-list__name" th:text="${f.filePath}"></span>
                        <span class="file-list__type" th:text="${f.contentType}"></span>
                    </li>
                </ul>
            </div>

            <div class="card card--narrow animate-in animate-in--d2">
                <p class="label" style="margin-bottom:1.5rem">Replace content</p>
                <form th:action="@{/edit/{slug}(slug=${content.slug})}" method="post"
                      enctype="multipart/form-data">
                    <div class="form-group">
                        <div class="drop-zone" id="dropZone">
                            <div class="drop-zone__icon">&#8593;</div>
                            <p class="drop-zone__text">
                                Drop a file here or <strong>browse</strong>
                            </p>
                            <p class="drop-zone__sub" id="fileName">HTML file or ZIP archive, up to 10 MB</p>
                            <input type="file" name="file" id="file" required
                                   accept=".html,.htm,.zip"
                                   onchange="showFileName(this)">
                        </div>
                    </div>

                    <button class="btn btn--primary" type="submit" style="width:100%;justify-content:center">
                        Update content
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script th:src="@{/js/themes.js}"></script>
    <script>
        function showFileName(input) {
            var label = document.getElementById('fileName');
            if (input.files.length > 0) {
                var file = input.files[0];
                var size = (file.size / 1024).toFixed(1);
                label.textContent = file.name + ' (' + size + ' KB)';
            }
        }

        var zone = document.getElementById('dropZone');
        var fileInput = document.getElementById('file');

        zone.addEventListener('dragover', function(e) {
            e.preventDefault();
            zone.classList.add('drop-zone--active');
        });

        zone.addEventListener('dragleave', function() {
            zone.classList.remove('drop-zone--active');
        });

        zone.addEventListener('drop', function(e) {
            e.preventDefault();
            zone.classList.remove('drop-zone--active');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFileName(fileInput);
            }
        });
    </script>
</body>
</html>
