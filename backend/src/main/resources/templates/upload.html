<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Easy Host</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .navbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 1.2rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 2rem; }
        .card h2 { margin-bottom: 1.5rem; font-size: 1.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 0.3rem; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
        input[type="text"] { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 0.95rem; }
        input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
        input[type="file"] { font-size: 0.9rem; }
        .btn { padding: 0.55rem 1.2rem; border: none; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-outline { background: transparent; border: 1px solid #d0d0d0; color: #333; }
        .btn-outline:hover { background: #f5f5f5; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .alert { padding: 0.6rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        a { color: #4a90d9; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a th:href="@{/dashboard}" style="color:inherit">Easy Host</a></h1>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <h2>Upload new content</h2>
            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="slug">Slug</label>
                    <input type="text" id="slug" name="slug" required
                           pattern="[a-z0-9][a-z0-9-]*[a-z0-9]|[a-z0-9]"
                           placeholder="my-site">
                    <p class="hint">Lowercase letters, numbers, and hyphens only. Your content will be served at /s/your-slug</p>
                </div>
                <div class="form-group">
                    <label for="file">File</label>
                    <input type="file" id="file" name="file" required accept=".html,.htm,.zip">
                    <p class="hint">Upload a single HTML file or a ZIP archive containing HTML, CSS, and JS files.</p>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Upload</button>
                    <a th:href="@{/dashboard}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
