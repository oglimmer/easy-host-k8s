<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload — easy-host</title>
    <script>document.documentElement.dataset.theme=localStorage.getItem('eh-theme')||'obsidian'</script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="topbar__brand" th:href="@{/dashboard}">
                easy-host <span>upload</span>
            </a>
            <nav class="topbar__nav">
                <a class="topbar__link" th:href="@{/dashboard}">Content</a>
                <a class="topbar__link topbar__link--active" th:href="@{/upload}">Upload</a>
                <a class="topbar__link" th:href="@{/developers}">Developers</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button class="topbar__link" type="submit"
                            style="background:none;border:none;cursor:pointer;font:inherit;padding:0">
                        Sign out
                    </button>
                </form>
            </nav>
        </header>

        <main class="main">
            <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>
            <div th:if="${error}" class="flash flash--error" th:text="${error}"></div>

            <div class="section-header animate-in">
                <div class="section-header__title">
                    <h1 class="display display--lg">Upload content</h1>
                </div>
                <a class="btn btn--ghost" th:href="@{/dashboard}">Back</a>
            </div>

            <div class="card card--narrow animate-in animate-in--d1">
                <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label class="form-label" for="slug">Slug</label>
                        <input class="form-input" type="text" id="slug" name="slug"
                               placeholder="my-project" required
                               pattern="^[a-z0-9][a-z0-9-]*[a-z0-9]$"
                               oninput="updatePreview(this.value)">
                        <div class="slug-preview">
                            <span>/s/</span><span class="slug-preview__value" id="slugPreview">your-slug</span>
                        </div>
                        <p class="form-hint" id="slugHint">Lowercase letters, numbers, and hyphens. Min 2 characters.</p>
                        <p class="form-hint" id="slugError" style="display:none;color:var(--accent)">
                            Invalid slug.
                            <a href="#" id="slugFixLink" style="color:var(--accent);text-decoration:underline;cursor:pointer"
                               onclick="fixSlug(); return false;">Fix it</a>
                        </p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="title">Title <span style="color:var(--muted)">(optional)</span></label>
                        <input class="form-input" type="text" id="title" name="title"
                               placeholder="My Project">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="sourceUrl">Source URL <span style="color:var(--muted)">(optional)</span></label>
                        <input class="form-input" type="url" id="sourceUrl" name="sourceUrl"
                               placeholder="https://github.com/user/repo">
                    </div>

                    <div class="form-group">
                        <label class="form-label">File</label>
                        <div class="drop-zone" id="dropZone">
                            <div class="drop-zone__icon">&#8593;</div>
                            <p class="drop-zone__text">
                                Drop a file here or <strong>browse</strong>
                            </p>
                            <p class="drop-zone__sub" id="fileName">HTML file or ZIP archive, up to 10 MB</p>
                            <input type="file" name="file" id="file" required
                                   accept=".html,.htm,.zip"
                                   onchange="showFileName(this)">
                        </div>
                    </div>

                    <button class="btn btn--primary" type="submit" style="width:100%;justify-content:center">
                        Upload
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script th:src="@{/js/themes.js}"></script>
    <script>
        var slugPattern = /^[a-z0-9][a-z0-9-]*[a-z0-9]$/;

        function toValidSlug(value) {
            var s = value.toLowerCase().trim();
            s = s.replace(/[^a-z0-9-]/g, '-');   // replace invalid chars with hyphens
            s = s.replace(/-{2,}/g, '-');          // collapse multiple hyphens
            s = s.replace(/^-+|-+$/g, '');         // strip leading/trailing hyphens
            return s;
        }

        function validateSlug(value) {
            var errorEl = document.getElementById('slugError');
            var hintEl = document.getElementById('slugHint');
            if (!value || slugPattern.test(value)) {
                errorEl.style.display = 'none';
                hintEl.style.display = '';
            } else {
                var suggestion = toValidSlug(value);
                if (suggestion.length >= 2 && slugPattern.test(suggestion)) {
                    document.getElementById('slugFixLink').textContent = 'Fix it \u2192 ' + suggestion;
                    errorEl.style.display = '';
                } else {
                    document.getElementById('slugFixLink').textContent = 'Fix it';
                    errorEl.style.display = '';
                }
                hintEl.style.display = 'none';
            }
        }

        function fixSlug() {
            var input = document.getElementById('slug');
            var fixed = toValidSlug(input.value);
            if (fixed.length >= 2) {
                input.value = fixed;
                updatePreview(fixed);
                validateSlug(fixed);
            }
        }

        function updatePreview(value) {
            document.getElementById('slugPreview').textContent = value || 'your-slug';
            validateSlug(value);
        }

        function showFileName(input) {
            var label = document.getElementById('fileName');
            if (input.files.length > 0) {
                var file = input.files[0];
                var size = (file.size / 1024).toFixed(1);
                label.textContent = file.name + ' (' + size + ' KB)';
            }
        }

        var zone = document.getElementById('dropZone');
        var fileInput = document.getElementById('file');

        zone.addEventListener('dragover', function(e) {
            e.preventDefault();
            zone.classList.add('drop-zone--active');
        });

        zone.addEventListener('dragleave', function() {
            zone.classList.remove('drop-zone--active');
        });

        zone.addEventListener('drop', function(e) {
            e.preventDefault();
            zone.classList.remove('drop-zone--active');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFileName(fileInput);
            }
        });
    </script>
</body>
</html>
