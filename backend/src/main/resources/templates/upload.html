<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy - Easy Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #08080d;
            --surface: #111119;
            --surface-raised: #181824;
            --border: #2a2a3a;
            --text: #e0ddd8;
            --text-muted: #7a7a8e;
            --accent: #b8ff57;
            --accent-dim: rgba(184, 255, 87, 0.15);
            --accent-glow: rgba(184, 255, 87, 0.3);
            --danger: #ff5757;
            --danger-dim: rgba(255, 87, 87, 0.12);
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .brand span { color: var(--text-muted); font-weight: 400; }

        .container {
            max-width: 580px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        .alert {
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            border-left: 3px solid;
            animation: alertIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes alertIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert-error {
            background: var(--danger-dim);
            color: var(--danger);
            border-color: var(--danger);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            position: relative;
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .card-title {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            line-height: 1.5;
        }

        .hint code {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 0.1rem 0.35rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-dim);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Custom file upload */
        .file-input-wrap {
            position: relative;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg);
            border: 1px dashed var(--border);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            text-align: center;
        }

        .file-input-label:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .file-input-text {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .file-input-text strong {
            color: var(--accent);
            font-weight: 700;
        }

        input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.65rem 1.5rem;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/dashboard}" class="brand">easy<span>host</span></a>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <h2 class="card-title">New deployment</h2>
            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="slug">Slug</label>
                    <input type="text" id="slug" name="slug" required
                           pattern="[a-z0-9][a-z0-9-]*[a-z0-9]|[a-z0-9]"
                           placeholder="my-site">
                    <p class="hint">Lowercase, numbers, hyphens. Served at <code>/s/your-slug</code></p>
                </div>
                <div class="form-group">
                    <label for="file">File</label>
                    <div class="file-input-wrap">
                        <label class="file-input-label" for="file" id="dropLabel">
                            <span class="file-input-text"><strong>Choose file</strong> or drag &amp; drop<br>.html, .htm, or .zip</span>
                        </label>
                        <input type="file" id="file" name="file" required accept=".html,.htm,.zip">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Deploy</button>
                    <a th:href="@{/dashboard}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Show selected filename
        document.getElementById('file').addEventListener('change', function() {
            const label = document.getElementById('dropLabel');
            const text = label.querySelector('.file-input-text');
            if (this.files.length > 0) {
                text.innerHTML = '<strong>' + this.files[0].name + '</strong>';
                label.style.borderColor = 'var(--accent)';
            }
        });
    </script>
</body>
</html>
