name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend
        run: ./mvnw verify

      - name: Build Docker image
        working-directory: backend
        run: docker build -t registry.oglimmer.com/easy-host:${{ github.sha }} -t registry.oglimmer.com/easy-host:latest .

      - name: Log in to registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.oglimmer.com -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push registry.oglimmer.com/easy-host:${{ github.sha }}
          docker push registry.oglimmer.com/easy-host:latest
